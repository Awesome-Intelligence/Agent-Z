openapi: 3.0.0
info:
  title: Handsome Agent Brain Service
  description: |
    OpenAI-compatible API for Handsome Agent.
    
    Supports:
    - Chat Completions API (OpenAI compatible)
    - Responses API (OpenAI compatible)
    - Runs API (async execution with SSE events)
    - Session management with continuity headers
    - CORS support for web frontends
  
  version: 1.0.0

servers:
  - url: http://localhost:8001
    description: Handsome Agent API Server

paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  platform:
                    type: string
                    example: handsome-agent

  /health/detailed:
    get:
      summary: Detailed health check
      operationId: healthCheckDetailed
      responses:
        '200':
          description: Detailed status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  platform:
                    type: string
                  pid:
                    type: integer
                  uptime:
                    type: number
                  memory_available_mb:
                    type: integer

  /v1/models:
    get:
      summary: List available models
      operationId: listModels
      responses:
        '200':
          description: List of models
          content:
            application/json:
              schema:
                type: object
                properties:
                  object:
                    type: string
                    example: list
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        object:
                          type: string
                          example: model
                        created:
                          type: integer
                        owned_by:
                          type: string

  /v1/capabilities:
    get:
      summary: API capabilities
      operationId: getCapabilities
      responses:
        '200':
          description: API capabilities
          content:
            application/json:
              schema:
                type: object

  /v1/chat/completions:
    post:
      summary: Chat completions
      operationId: chatCompletions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: Chat completion response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatCompletionResponse'
        '400':
          description: Invalid request
        '401':
          description: Unauthorized
        '500':
          description: Server error

  /v1/responses:
    post:
      summary: Create response
      operationId: createResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponseRequest'
      responses:
        '200':
          description: Response created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseObject'

  /v1/responses/{response_id}:
    get:
      summary: Get response
      operationId: getResponse
      parameters:
        - name: response_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Response found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseObject'
        '404':
          description: Response not found

    delete:
      summary: Delete response
      operationId: deleteResponse
      parameters:
        - name: response_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Response deleted

  /v1/runs:
    post:
      summary: Start a run
      operationId: createRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Run started

  /v1/runs/{run_id}:
    get:
      summary: Get run status
      operationId: getRunStatus
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run status
        '404':
          description: Run not found

  /v1/runs/{run_id}/events:
    get:
      summary: Get SSE events stream
      operationId: getRunEvents
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: SSE stream

  /v1/runs/{run_id}/approval:
    post:
      summary: Resolve run approval
      operationId: resolveRunApproval
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approved:
                  type: boolean
      responses:
        '200':
          description: Approval resolved

  /v1/runs/{run_id}/stop:
    post:
      summary: Stop a run
      operationId: stopRun
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Run stopped

components:
  schemas:
    ChatCompletionRequest:
      type: object
      required:
        - messages
      properties:
        model:
          type: string
          default: handsome-agent
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        stream:
          type: boolean
          default: false
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 1
        max_tokens:
          type: integer
        tools:
          type: array
        tool_choice:
          type: string
          enum: [auto, none, any]

    ChatCompletionResponse:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: chat.completion
        created:
          type: integer
        model:
          type: string
        choices:
          type: array
          items:
            type: object
            properties:
              index:
                type: integer
              message:
                $ref: '#/components/schemas/ChatMessage'
              finish_reason:
                type: string
        usage:
          $ref: '#/components/schemas/Usage'

    ChatMessage:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
        content:
          oneOf:
            - type: string
            - type: array
        name:
          type: string

    ResponseRequest:
      type: object
      properties:
        previous_response_id:
          type: string
        input:
          oneOf:
            - type: string
            - type: array
        model:
          type: string
        temperature:
          type: number
        max_tokens:
          type: integer

    ResponseObject:
      type: object
      properties:
        id:
          type: string
        object:
          type: string
          example: response
        status:
          type: string
        output:
          type: array
        usage:
          $ref: '#/components/schemas/Usage'

    Usage:
      type: object
      properties:
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer

security:
  - BearerAuth: []

securitySchemes:
  BearerAuth:
    type: http
    scheme: bearer
