# Handsome Agent Docker 配置
# 架构变更：合并 api/ 到 gateway/，使用单服务架构

version: '3.8'

services:
  handsome-agent:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: handsome-agent
    ports:
      - "8000:8000"
    environment:
      - GATEWAY_PORT=8000
      - LOG_LEVEL=INFO
    volumes:
      - ./skills:/root/.skills
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - handsome-network

networks:
  handsome-network:
    driver: bridge