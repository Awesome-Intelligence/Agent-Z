# 意图识别配置
intent_classification:
  mode: "llm"
  confidence_threshold: 0.3
  enable_detailed_logs: true
  default_language: "zh"
  llm_prompt_template: |
    你是一个专业的意图分类器。请分析用户输入，判断其意图类型。

    意图类型定义：
    - conversation: 日常对话、聊天、问答、闲聊、分析、任务管理、待办事项等纯语言交互场景
    - operation: 执行命令、操作文件、打开应用、搜索查询、系统配置、工具调用等操作类场景
    - coding: 编程开发、代码生成、写程序、写脚本、开发软件、开发网站、app开发等编程相关场景

    用户输入："{user_input}"

    请严格按照以下格式输出，只返回意图类型名称：
    conversation
    或
    operation
    或
    coding